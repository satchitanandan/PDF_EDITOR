services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://pdfeditor:pdfeditor@db:5432/pdfeditor
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pdfeditor
      POSTGRES_PASSWORD: pdfeditor
      POSTGRES_DB: pdfeditor
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfeditor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
